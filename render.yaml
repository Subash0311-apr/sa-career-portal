services:
  - type: web
    name: sa-career-page
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist/sa-career-page/browser
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.csr.html
